<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyVoice | Premium Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.5);
            --secondary: #0ea5e9;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15) 0%, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status {
            color: var(--secondary);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        /* Microphone Button */
        .mic-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mic-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 10px 25px var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px var(--primary-glow);
        }

        .mic-btn.listening {
            animation: pulse-btn 1.5s infinite;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);
        }

        .ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
        }

        .mic-btn.listening ~ .ripple {
            animation: ripple-anim 1.5s infinite;
            background: #ef4444;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes ripple-anim {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* History */
        .history-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 24px;
            height: 350px;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            scroll-behavior: smooth;
        }

        .history-container::-webkit-scrollbar {
            width: 8px;
        }
        .history-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .msg {
            padding: 1rem 1.5rem;
            border-radius: 20px;
            max-width: 80%;
            font-size: 1.05rem;
            line-height: 1.5;
            animation: fade-in 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fade-in {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.assistant {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(14, 165, 233, 0.2));
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid var(--secondary);
            text-align: left;
        }

        /* Input Controls */
        .controls {
            display: flex;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 0.5rem;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input {
            background: transparent;
            border: none;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1.05rem;
            flex: 1;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        input::placeholder {
            color: var(--muted);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover {
            background: #4338ca;
            transform: translateX(-2px);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SkyVoice</h1>
            <div class="status" id="status">Systems Online</div>
        </div>

        <div class="mic-wrapper">
            <button class="mic-btn" id="micBtn" onclick="toggleListening()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
            </button>
            <div class="ripple"></div>
        </div>

        <div class="history-container" id="history">
            <div class="msg assistant">Hello! I'm SkyVoice. Click the microphone icon above and speak your command, or type it below.</div>
        </div>

        <div class="controls">
            <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendCommand()">
                Send
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;
        let lastCommandTime = 0;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('listening');
                updateStatus('Listening...', '#ef4444');
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                processVoiceCommand(text);
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error', event.error);
                stopListening();
                updateStatus('Microphone Error', '#ef4444');
                setTimeout(() => updateStatus('Systems Online', 'var(--secondary)'), 2000);
            };

            recognition.onend = () => {
                stopListening();
            };
        }

        function toggleListening() {
            if (!recognition) {
                alert("Your browser does not support voice recognition. Please use Google Chrome or Microsoft Edge.");
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function stopListening() {
            isListening = false;
            document.getElementById('micBtn').classList.remove('listening');
            if(document.getElementById('status').innerText === 'Listening...') {
                updateStatus('Systems Online', 'var(--secondary)');
            }
        }

        function updateStatus(text, color) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = text;
            statusEl.style.color = color || 'var(--secondary)';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendCommand();
        }

        async function processVoiceCommand(text) {
            addMsg('user', text);
            updateStatus('Thinking...', 'var(--primary)');
            await sendToServer(text);
        }

        async function sendCommand() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;
            
            input.value = '';
            addMsg('user', text);
            updateStatus('Thinking...', 'var(--primary)');
            await sendToServer(text);
        }

        async function sendToServer(text) {
            try {
                await fetch('/command', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: text})
                });
            } catch(e) {
                console.error("Failed to send command to server", e);
                updateStatus('Connection Error', '#ef4444');
            }
        }

        function addMsg(sender, text) {
            const history = document.getElementById('history');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        // Poll for history updates from backend
        setInterval(async () => {
            try {
                const res = await fetch('/history');
                const data = await res.json();
                const historyDiv = document.getElementById('history');
                
                if(data.length > 0) {
                    const lastMsg = data[data.length - 1];
                    // Prevent duplicates by checking time or content (simplified here)
                    const existingMsgElements = historyDiv.querySelectorAll('.assistant');
                    const lastDisplayed = existingMsgElements.length > 0 ? 
                        existingMsgElements[existingMsgElements.length - 1].innerText : "";
                    
                    // We only add if sender is Assistant (user msgs are added optimistically)
                    if(lastMsg.text !== lastDisplayed && lastMsg.sender === 'Assistant') {
                        addMsg('assistant', lastMsg.text);
                        updateStatus('Systems Online', 'var(--secondary)');
                        
                        // Use Web Speech API for response readout
                        const utterance = new SpeechSynthesisUtterance(lastMsg.text);
                        window.speechSynthesis.speak(utterance);
                    }
                }
            } catch(e) {
                // Silent catch for polling
            }
        }, 1000);
    </script>
</body>
</html>
